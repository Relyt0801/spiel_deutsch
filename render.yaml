services:
  - type: web
    name: remigianum-monopoly-server
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false

  - type: web
    name: remigianum-monopoly-client
    runtime: node
    region: frankfurt
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_SOCKET_URL
        sync: false
